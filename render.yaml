services:
  - type: web
    name: rupaay-fest-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: EVENT_NAME
        value: Rupaayi Fest 2026